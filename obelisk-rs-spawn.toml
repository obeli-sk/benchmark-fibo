wasm.backtrace.persist = false
activities.directories.enabled = true

[log.console]
enabled = true

[[activity_wasm]]
name = "fiboa_rs_spawn"
location = "${OBELISK_TOML_DIR}/target/wasm32-wasip2/release_activity/fiboa_rs_spawn.wasm"
max_retries = 0
exec.lock_expiry.seconds = 25
env_vars = ["FIBO_EXE_PATH"]
directories  = { enabled = true, reuse_on_retry = false, process_provider = "native"}

[[workflow]]
name = "fibow_rs"
location = "${OBELISK_TOML_DIR}/target/wasm32-unknown-unknown/release_workflow/fibow_rs.wasm"
exec.lock_expiry.seconds = 2
